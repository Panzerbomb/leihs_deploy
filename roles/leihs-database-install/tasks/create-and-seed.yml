- name: check for existing database
  changed_when: false
  register: check_existing_database
  shell: |
    PGPASSWORD='{{database_password}}' psql --port '{{database_port}}' --dbname '{{database_database}}' --username '{{database_username}}' -AXtq -c \
      "SELECT 'already exists' FROM pg_database WHERE datname = '{{database_database}}';"
  become: True
  become_user: "{{database_username}}"

- name: copy structure and seeds to remote
  when: '"already exists" not in check_existing_database.stdout'
  copy:
    src: "{{playbook_dir}}/../database/db/{{item}}"
    dest: /tmp/{{item}}
  loop:
    - structure.sql
    - seeds.sql

- name: create database
  when: '"already exists" not in check_existing_database.stdout'
  postgresql_db:
    name: "{{database_name}}"
    login_port: "{{database_port}}"
    lc_collate: de_CH.UTF-8
    lc_ctype: de_CH.UTF-8
    state: present
    template: template0
    login_user: "{{database_username}}"
    login_password: "{{database_password}}"

- name: create and seed database if it does not exist
  when: '"already exists" not in check_existing_database.stdout'
  shell: |
    #!/usr/bin/env bash
    set -euo pipefail
    /usr/lib/postgresql/{{postgres_version}}/bin/psql \
      -d '{{database_name}}' --port "{{database_port}}" \
      -f '/tmp/structure.sql'
    /usr/lib/postgresql/{{postgres_version}}/bin/psql \
      -d '{{database_name}}' --port "{{database_port}}" \
      -c 'SET session_replication_role = REPLICA;' \
      -f '/tmp/seeds.sql' \
      -c 'SET session_replication_role = DEFAULT;'

  args:
    executable: /bin/bash

